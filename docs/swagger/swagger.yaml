        type: string
      period_start:
        description: period_start is the start date of the billing period
        type: string
      prepared_tax_rates:
        description: prepared_tax_rates contains the tax rates pre-resolved by the
          caller (e.g., billing service)
        items:
          $ref: '#/definitions/dto.TaxRateResponse'
        type: array
      subscription_id:
        description: subscription_id is the optional unique identifier of the subscription
          associated with this invoice
        type: string
      subtotal:
        description: subtotal is the amount before taxes and discounts are applied
        type: string
      tax_rate_overrides:
        description: tax_rate_overrides is the tax rate overrides to be applied to
          the invoice
        items:
          $ref: '#/definitions/dto.TaxRateOverride'
        type: array
      tax_rates:
        description: tax_rates
        items:
          type: string
        type: array
      total:
        description: total is the total amount of the invoice including taxes and
          discounts
        type: string
      total_prepaid_applied:
        description: total_prepaid_applied is the total amount of prepaid applied
          to this invoice.
