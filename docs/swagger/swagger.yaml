      trial_end:
        description: TrialEnd is the end date of the trial period
        type: string
      trial_start:
        description: TrialStart is the start date of the trial period
        type: string
      updated_at:
        type: string
      updated_by:
        type: string
      version:
        description: Version is used for optimistic locking
        type: integer
    type: object
