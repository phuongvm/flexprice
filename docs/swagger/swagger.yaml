  dto.InvoiceResponse:
    properties:
      adjustment_amount:
        description: |-
          adjustment_amount is the total sum of credit notes of type "adjustment".
          These are non-cash reductions applied to the invoice (e.g. goodwill credit, billing correction).
        type: string
      amount_due:
        description: amount_due is the total amount that needs to be paid for this
          invoice
        type: string
      amount_paid:
        description: amount_paid is the amount that has already been paid towards
          this invoice
        type: string
      amount_remaining:
        description: amount_remaining is the outstanding amount still owed on this
          invoice (calculated as amount_due minus amount_paid)
        type: string
      billing_period:
        description: billing_period describes the billing period this invoice covers
          (e.g., "January 2024", "Q1 2024")
        type: string
      billing_reason:
        description: billing_reason indicates why this invoice was generated (e.g.,
          "subscription_billing", "manual_charge")
        type: string
      billing_sequence:
        description: billing_sequence is the sequential number indicating the billing
          cycle for subscription invoices
        type: integer
      coupon_applications:
        description: coupon_applications contains the coupon applications associated
          with this invoice (overrides embedded field)
        items:
          $ref: '#/definitions/dto.CouponApplicationResponse'
        type: array
      created_at:
        type: string
      created_by:
        type: string
      currency:
        description: currency is the three-letter ISO currency code (e.g., USD, EUR,
          GBP) that applies to all monetary amounts on this invoice
        type: string
      customer:
        allOf:
        - $ref: '#/definitions/dto.CustomerResponse'
        description: customer contains the customer information associated with this
          invoice
      customer_id:
        description: customer_id is the ID of the customer who will receive this invoice
        type: string
      description:
        description: description is an optional description or notes about this invoice
        type: string
      due_date:
        description: due_date is the date when payment for this invoice is due
        type: string
      environment_id:
        description: environment_id is the ID of the environment this invoice belongs
          to (for multi-environment setups)
        type: string
      finalized_at:
        description: finalized_at is the timestamp when this invoice was finalized
          and made ready for payment
        type: string
      id:
        description: id is the unique identifier for this invoice
        type: string
      idempotency_key:
        description: idempotency_key is a unique key used to prevent duplicate invoice
          creation when retrying API calls
        type: string
      invoice_number:
        description: invoice_number is the human-readable invoice number displayed
          to customers (e.g., INV-2024-001)
        type: string
      invoice_pdf_url:
        description: invoice_pdf_url is the URL where customers can download the PDF
          version of this invoice
        type: string
      invoice_status:
        allOf:
        - $ref: '#/definitions/types.InvoiceStatus'
        description: invoice_status represents the current status of the invoice -
          values include draft, open, paid, void, etc.
      invoice_type:
        allOf:
        - $ref: '#/definitions/types.InvoiceType'
        description: invoice_type indicates the type of invoice - whether this is
          a subscription invoice, one-time charge, or other billing type
      line_items:
        description: line_items contains the individual items that make up this invoice
          (overrides embedded field)
        items:
          $ref: '#/definitions/dto.InvoiceLineItemResponse'
        type: array
      metadata:
        allOf:
        - $ref: '#/definitions/types.Metadata'
        description: metadata contains custom key-value pairs for storing additional
          information about this invoice
      overpaid_amount:
        description: overpaid_amount is the amount overpaid if payment_status is OVERPAID
          (amount_paid - total)
        type: string
      paid_at:
        description: paid_at is the timestamp when this invoice was fully paid
        type: string
      payment_status:
        allOf:
        - $ref: '#/definitions/types.PaymentStatus'
        description: payment_status indicates whether the invoice has been paid, is
          pending, or failed
      period_end:
        description: period_end is the end date of the billing period covered by this
          invoice
        type: string
      period_start:
        description: period_start is the start date of the billing period covered
          by this invoice
        type: string
      recalculated_invoice_id:
        description: |-
          recalculated_invoice_id is the ID of the replacement invoice created when this invoice was voided and recalculated.
          When set, it forms a parent→child link from this (voided) invoice to the new replacement invoice.
        type: string
      refunded_amount:
        description: |-
          refunded_amount is the total sum of credit notes of type "refund".
          These are actual refunds issued to the customer.
        type: string
      status:
        $ref: '#/definitions/types.Status'
      subscription:
        allOf:
        - $ref: '#/definitions/dto.SubscriptionResponse'
        description: subscription contains the associated subscription information
          if requested
      subscription_id:
        description: subscription_id is the ID of the subscription this invoice is
          associated with (only present for subscription-based invoices)
        type: string
      subtotal:
        description: subtotal is the sum of all line items before any taxes, discounts,
          or additional fees
        type: string
      taxes:
        description: tax_applied_records contains the tax applied records associated
          with this invoice
        items:
          $ref: '#/definitions/dto.TaxAppliedResponse'
        type: array
      tenant_id:
        type: string
      total:
        description: total is the final amount including taxes, fees, and discounts
        type: string
      total_discount:
        description: total_discount is the sum of all coupon discounts applied to
          the invoice
        type: string
      total_prepaid_credits_applied:
        description: total_prepaid_credits_applied is the total amount of prepaid
          credits applied to this invoice.
        type: string
      total_tax:
        description: total_tax is the sum of all taxes combined at the invoice level.
        type: string
      updated_at:
        type: string
      updated_by:
        type: string
      version:
        description: version is the version number for tracking changes to this invoice
        type: integer
      voided_at:
        description: voided_at is the timestamp when this invoice was voided or cancelled
        type: string
    type: object
