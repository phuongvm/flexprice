      billing_period:
        allOf:
        - $ref: '#/definitions/types.BillingPeriod'
        description: billing_period is the billing period for the new subscription
      billing_period_count:
        default: 1
        description: billing_period_count is the billing period count for the new
          subscription
        type: integer
      change_at:
        allOf:
        - $ref: '#/definitions/types.ScheduleType'
        description: |-
          change_at determines when the change should take effect (optional)
          If not provided or null: change executes immediately
          If "immediate": change executes immediately (explicit)
          If "period_end": change is scheduled for the end of the current billing period
      metadata:
        additionalProperties:
