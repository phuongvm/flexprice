info:
  contact:
    name: API Support
  description: Flexprice API Service
  license:
    name: AGPL-3.0
    url: https://www.gnu.org/licenses/agpl-3.0.html
  title: Flexprice API
  version: "1.0"
paths:
  /addons:
    post:
      consumes:
      - application/json
      description: Use when defining an optional purchasable item (e.g. extra storage
        or support tier). Ideal for add-ons that customers can attach to a subscription.
      operationId: createAddon
      parameters:
      - description: Addon Request
        in: body
        name: addon
        required: true
        schema:
          $ref: '#/definitions/dto.CreateAddonRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.CreateAddonResponse'
        "400":
          description: Invalid request
          schema:
            $ref: '#/definitions/errors.ErrorResponse'
        "500":
          description: Server error
          schema:
            $ref: '#/definitions/errors.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Create addon
      tags:
      - Addons
  /addons/{id}:
    delete:
      description: Use when retiring an addon (e.g. end-of-life). Returns 200 with
        success message.
      operationId: deleteAddon
      parameters:
      - description: Addon ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.SuccessResponse'
        "400":
          description: Invalid request
          schema:
            $ref: '#/definitions/errors.ErrorResponse'
        "500":
          description: Server error
          schema:
            $ref: '#/definitions/errors.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Delete addon
      tags:
      - Addons
    get:
      description: Use when you need to load a single addon (e.g. for display or to
        attach to a subscription).
      operationId: getAddon
      parameters:
      - description: Addon ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
